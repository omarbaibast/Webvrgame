<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Story Game</title>

<style>
body{margin:0;overflow:hidden;background:black;}

#dialog{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-family:monospace;
background:rgba(0,0,0,0.7);
padding:15px;
display:none;
}
</style>
</head>

<body>

<div id="dialog"></div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";
import { VRButton } from "https://unpkg.com/three@0.152.2/examples/jsm/webxr/VRButton.js";

/////////////////////////////////////////////////
// SCENE
/////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const player = new THREE.Object3D();
player.position.set(0,2,5);
player.add(camera);
scene.add(player);

/////////////////////////////////////////////////
// RENDERER
/////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

/////////////////////////////////////////////////
// LIGHT
/////////////////////////////////////////////////

scene.add(new THREE.HemisphereLight(0xffffff,0x444444));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

/////////////////////////////////////////////////
// TERRAIN
/////////////////////////////////////////////////

const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshStandardMaterial({color:0x55aa55});

for(let x=-10;x<10;x++){
for(let z=-10;z<10;z++){

const block = new THREE.Mesh(geo,mat);
block.position.set(x,0,z);

scene.add(block);

}
}

/////////////////////////////////////////////////
// LOW POLY CHARACTER
/////////////////////////////////////////////////

const npc = new THREE.Group();

const skin = new THREE.MeshStandardMaterial({color:0xffcc99});
const shirt = new THREE.MeshStandardMaterial({color:0x3366ff});
const pants = new THREE.MeshStandardMaterial({color:0x222222});

const head = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6),skin);
head.position.y = 1.8;

const body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1,0.4),shirt);
body.position.y = 1.1;

const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.9,0.3),pants);
leg1.position.set(-0.2,0.45,0);

const leg2 = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.9,0.3),pants);
leg2.position.set(0.2,0.45,0);

const arm1 = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.9,0.25),shirt);
arm1.position.set(-0.6,1.2,0);

const arm2 = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.9,0.25),shirt);
arm2.position.set(0.6,1.2,0);

npc.add(head,body,leg1,leg2,arm1,arm2);

npc.position.set(0,0,-3);

scene.add(npc);

/////////////////////////////////////////////////
// STORY
/////////////////////////////////////////////////

const dialog = document.getElementById("dialog");

const story = [
"Hello traveler...",
"This world is made of voxels.",
"Your journey begins here.",
"Explore and build your destiny."
];

let storyIndex = 0;

function showDialog(){

dialog.style.display="block";
dialog.innerText = story[storyIndex];

storyIndex++;

if(storyIndex>=story.length){
storyIndex=0;
}

}

/////////////////////////////////////////////////
// GAMEPAD
/////////////////////////////////////////////////

function getPad(){

const pads = navigator.getGamepads();

for(let p of pads){
if(p) return p;
}

return null;

}

/////////////////////////////////////////////////
// MOVEMENT
/////////////////////////////////////////////////

let velocityY=0;
let onGround=true;

function updateController(){

const gp = getPad();
if(!gp) return;

const lx = gp.axes[0];
const ly = gp.axes[1];
const rx = gp.axes[2];

player.rotation.y -= rx*0.05;

const speed=0.15;

const forward = new THREE.Vector3(
Math.sin(player.rotation.y),
0,
Math.cos(player.rotation.y)
);

const right = new THREE.Vector3(
Math.cos(player.rotation.y),
0,
-Math.sin(player.rotation.y)
);

player.position.add(forward.multiplyScalar(-ly*speed));
player.position.add(right.multiplyScalar(lx*speed));

if(gp.buttons[0].pressed && onGround){

velocityY = 0.18;
onGround=false;

}

if(gp.buttons[3].pressed){
showDialog();
}

}

/////////////////////////////////////////////////
// PHYSICS
/////////////////////////////////////////////////

function physics(){

velocityY -= 0.01;

player.position.y += velocityY;

if(player.position.y<2){

player.position.y=2;
velocityY=0;
onGround=true;

}

}

/////////////////////////////////////////////////
// LOOP
/////////////////////////////////////////////////

renderer.setAnimationLoop(()=>{

updateController();
physics();

renderer.render(scene,camera);

});

</script>

</body>
</html>
