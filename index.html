<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Voxel Game</title>

<style>
body{margin:0;overflow:hidden;background:black;}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
}
</style>
</head>

<body>

<div id="ui">
PS4 Controls<br>
Move: Left Stick<br>
Turn: Right Stick<br>
Jump: X<br>
Build: R2<br>
Break: L2
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";
import { VRButton } from "https://unpkg.com/three@0.152.2/examples/jsm/webxr/VRButton.js";

/////////////////////////////////////////////////
//// SCENE
/////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const player = new THREE.Object3D();
player.position.set(0,2,5);
player.add(camera);
scene.add(player);

/////////////////////////////////////////////////
//// RENDERER
/////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

/////////////////////////////////////////////////
//// LIGHT
/////////////////////////////////////////////////

scene.add(new THREE.HemisphereLight(0xffffff,0x444444));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

/////////////////////////////////////////////////
//// VOXEL SYSTEM
/////////////////////////////////////////////////

const blocks = [];
const geo = new THREE.BoxGeometry(1,1,1);

function createBlock(x,y,z,color=0x55aa55){

const mat = new THREE.MeshStandardMaterial({color});
const cube = new THREE.Mesh(geo,mat);

cube.position.set(x,y,z);

scene.add(cube);
blocks.push(cube);

}

//// ground

for(let x=-10;x<10;x++){
for(let z=-10;z<10;z++){
createBlock(x,0,z);
}
}

/////////////////////////////////////////////////
//// RAYCAST FOR BUILDING
/////////////////////////////////////////////////

const raycaster = new THREE.Raycaster();

function getLookBlock(){

const dir = new THREE.Vector3(0,0,-1);
dir.applyQuaternion(camera.quaternion);

raycaster.set(camera.getWorldPosition(new THREE.Vector3()),dir);

const hits = raycaster.intersectObjects(blocks);

if(hits.length>0) return hits[0];

return null;

}

function placeBlock(){

const hit = getLookBlock();

if(!hit) return;

const pos = hit.point.clone().add(hit.face.normal);

const x = Math.floor(pos.x);
const y = Math.floor(pos.y);
const z = Math.floor(pos.z);

createBlock(x,y,z,0x8888ff);

}

function breakBlock(){

const hit = getLookBlock();

if(!hit) return;

scene.remove(hit.object);

const i = blocks.indexOf(hit.object);

if(i>-1) blocks.splice(i,1);

}

/////////////////////////////////////////////////
//// GAMEPAD
/////////////////////////////////////////////////

function getPad(){

const pads = navigator.getGamepads();

for(let p of pads){
if(p) return p;
}

return null;

}

/////////////////////////////////////////////////
//// PHYSICS
/////////////////////////////////////////////////

let velocityY=0;
let onGround=true;

function physics(){

velocityY -= 0.01;

player.position.y += velocityY;

if(player.position.y < 2){

player.position.y = 2;
velocityY = 0;
onGround = true;

}

}

/////////////////////////////////////////////////
//// CONTROLLER
/////////////////////////////////////////////////

const DEADZONE = 0.15;

function deadzone(v){
return Math.abs(v)<DEADZONE?0:v;
}

let buildPressed=false;
let breakPressed=false;

function updateController(){

const gp = getPad();
if(!gp) return;

let lx = deadzone(gp.axes[0]);
let ly = deadzone(gp.axes[1]);
let rx = deadzone(gp.axes[2]);

//// fix inverted movement

ly = -ly;

player.rotation.y -= rx*0.05;

const speed = 0.15;

const forward = new THREE.Vector3(
Math.sin(player.rotation.y),
0,
Math.cos(player.rotation.y)
);

const right = new THREE.Vector3(
Math.cos(player.rotation.y),
0,
-Math.sin(player.rotation.y)
);

player.position.add(forward.multiplyScalar(ly*speed));
player.position.add(right.multiplyScalar(lx*speed));

//// jump

if(gp.buttons[0].pressed && onGround){

velocityY=0.18;
onGround=false;

}

//// build

if(gp.buttons[7].pressed){

if(!buildPressed){
placeBlock();
buildPressed=true;
}

}else{
buildPressed=false;
}

//// break

if(gp.buttons[6].pressed){

if(!breakPressed){
breakBlock();
breakPressed=true;
}

}else{
breakPressed=false;
}

}

/////////////////////////////////////////////////
//// LOOP
/////////////////////////////////////////////////

renderer.setAnimationLoop(()=>{

updateController();
physics();

renderer.render(scene,camera);

});

</script>

</body>
</html>
