<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fast VR Minecraft</title>
<style>
body{margin:0;overflow:hidden;background:black;}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";
import { VRButton } from "https://unpkg.com/three@0.152.2/examples/jsm/webxr/VRButton.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

const player = new THREE.Object3D();
player.position.set(0,2,5);
player.add(camera);
scene.add(player);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,0.4));

/////////////////////////////////////////////////
// INSTANCED BLOCKS (FAST)
/////////////////////////////////////////////////

const size = 40;
const count = size * size;

const geometry = new THREE.BoxGeometry(1,1,1);
const material = new THREE.MeshStandardMaterial({color:0x55aa55});

const blocks = new THREE.InstancedMesh(geometry,material,count);

let i = 0;
const matrix = new THREE.Matrix4();

for(let x=-size/2;x<size/2;x++){
for(let z=-size/2;z<size/2;z++){

matrix.setPosition(x,0,z);
blocks.setMatrixAt(i,matrix);
i++;

}
}

scene.add(blocks);

/////////////////////////////////////////////////
// GAMEPAD
/////////////////////////////////////////////////

function getGamepad(){

const pads = navigator.getGamepads();

for(let p of pads){
if(p) return p;
}

return null;

}

let velocityY = 0;
let onGround = true;

function updateController(){

const gp = getGamepad();
if(!gp) return;

const lx = gp.axes[0];
const ly = gp.axes[1];
const rx = gp.axes[2];

player.rotation.y -= rx * 0.05;

const speed = 0.15;

const forward = new THREE.Vector3(
Math.sin(player.rotation.y),
0,
Math.cos(player.rotation.y)
);

const right = new THREE.Vector3(
Math.cos(player.rotation.y),
0,
-Math.sin(player.rotation.y)
);

player.position.add(forward.multiplyScalar(-ly*speed));
player.position.add(right.multiplyScalar(lx*speed));

if(gp.buttons[0].pressed && onGround){

velocityY = 0.18;
onGround=false;

}

}

function physics(){

velocityY -= 0.01;
player.position.y += velocityY;

if(player.position.y < 2){

player.position.y = 2;
velocityY = 0;
onGround = true;

}

}

renderer.setAnimationLoop(()=>{

updateController();
physics();

renderer.render(scene,camera);

});

</script>

</body>
</html>
